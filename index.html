<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Capsule Beasts Map Upgrade</title>
<style>
*{box-sizing:border-box;user-select:none;touch-action:manipulation}
body{margin:0;background:#07101f;color:white;font-family:Arial,sans-serif;overflow:hidden}
button{border:0;border-radius:14px;background:#3559aa;color:white;font-weight:800;font-size:16px;padding:11px;box-shadow:inset 0 -4px #1a2a55,0 4px 0 #020712}
button:active{transform:translateY(3px)}
#game{position:fixed;inset:0;background:#14213d}
#start{position:absolute;inset:0;background:radial-gradient(circle,#263f78,#08101e);display:flex;align-items:center;justify-content:center;z-index:30;text-align:center;padding:22px}
.card{background:#17264c;border:4px solid #8ce4ff;border-radius:22px;padding:22px;max-width:450px}
h1{color:#bff2ff;margin:0 0 10px}
#world{display:none;position:absolute;inset:0;background:linear-gradient(#79a8ff 0 42%,#3f8a4b 43%)}
#top{position:absolute;left:8px;right:8px;top:8px;background:#101827dd;border:2px solid #8ce4ff;border-radius:12px;padding:8px;z-index:6;display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-weight:bold}
#top button{font-size:13px;padding:7px 9px}
#map{position:absolute;left:0;top:70px}
.tile{position:absolute;width:48px;height:48px;border:1px solid #0003}
.path{background:#b99a5e}.grass{background:#277b3d}.tall{background:#145c31}.water{background:#3b84d8}.wall{background:#202b49}
.center{background:#e86b7d}.shop{background:#d69b35}.house{background:#9b6b43}.door{background:#fff1a8}.floor{background:#6a815d}.counter{background:#b77a45}
#player{position:absolute;width:34px;height:42px;background:#2f7cff;border:4px solid #111;border-radius:10px;z-index:5;transition:left .1s,top .1s}
#player:before{content:"";position:absolute;left:6px;top:-17px;width:15px;height:15px;background:#ffd1ad;border:3px solid #111;border-radius:50%}
.npc{position:absolute;width:34px;height:42px;background:#ff8ee4;border:4px solid #111;border-radius:10px;z-index:4;transition:left .2s,top .2s}
.npc:before{content:"";position:absolute;left:6px;top:-17px;width:15px;height:15px;background:#ffc0a0;border:3px solid #111;border-radius:50%}
#dpad{position:absolute;left:18px;bottom:20px;width:168px;height:168px;z-index:8}
.dp{position:absolute;width:56px;height:56px;border:3px solid #8ce4ff;background:#263e79;font-size:23px}
#up{left:56px;top:0}#left{left:0;top:56px}#right{left:112px;top:56px}#down{left:56px;top:112px}
#rightBtns{position:absolute;right:16px;bottom:28px;display:flex;flex-direction:column;gap:8px;z-index:8}
#rightBtns button{width:120px;height:54px}
.panel{display:none;position:absolute;left:8px;right:8px;top:70px;bottom:205px;background:#101827ee;border:3px solid #8ce4ff;border-radius:18px;padding:12px;z-index:20;overflow:auto}
.row{display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid #ffffff22;padding:7px 0}
.small{font-size:12px;opacity:.85}.tag{padding:3px 7px;border-radius:999px;background:#ffffff22;font-size:12px}
.mini{width:42px;height:42px;border-radius:12px;border:3px solid #111;display:inline-block;box-shadow:inset -5px -5px #0003,inset 3px 3px #fff4}
#battle{display:none;position:absolute;inset:0;background:linear-gradient(#7ea7ff 0 48%,#3e7442 49%);z-index:25;padding:10px}
.hud{position:absolute;background:#101827e8;border:3px solid #8ce4ff;border-radius:14px;padding:8px;min-width:205px}
#enemyHud{right:12px;top:28px}#playerHud{left:12px;bottom:265px}
.bar{height:11px;background:#071020;border:2px solid #071020;border-radius:8px;overflow:hidden}.bar span{display:block;height:100%;background:#8fff72}
.mon{position:absolute;width:128px;height:128px;animation:bob 1.1s infinite steps(2)}
@keyframes bob{50%{transform:translateY(-8px)}}
#enemyMon{right:62px;top:120px}#myMon{left:50px;bottom:360px}
.beastBody{position:absolute;inset:10px;border:5px solid #111;box-shadow:inset -14px -14px #0004,inset 9px 9px #fff4,0 15px 24px #0008;z-index:3}
.shape0{border-radius:45% 45% 35% 35%}.shape1{border-radius:55% 35% 45% 30%}.shape2{border-radius:30% 60% 35% 55%}.shape3{border-radius:20px 40px 30px 50px}
.shape4{border-radius:50% 50% 20% 20%}.shape5{border-radius:35% 35% 55% 55%}.shape6{border-radius:25% 55% 25% 55%}.shape7{border-radius:60% 30% 60% 30%}
.monsterEye{position:absolute;top:34px;width:15px;height:22px;background:#111;border-radius:4px;z-index:6}.eyeL{left:28px}.eyeR{right:28px}
.monsterMouth{position:absolute;left:38px;top:72px;width:38px;height:9px;background:#111;border-radius:10px;z-index:6}
.belly{position:absolute;left:32px;bottom:16px;width:48px;height:34px;border:4px solid #111;border-radius:50%;opacity:.65;z-index:4}
.horn{position:absolute;left:39px;top:-28px;width:30px;height:38px;background:#ffe08a;border:4px solid #111;clip-path:polygon(50% 0,100% 100%,0 100%);z-index:7}
.spikes{position:absolute;left:12px;right:12px;top:-14px;height:22px;background:repeating-linear-gradient(90deg,#fff 0 10px,transparent 10px 20px);clip-path:polygon(0 100%,10% 0,20% 100%,30% 0,40% 100%,50% 0,60% 100%,70% 0,80% 100%,90% 0,100% 100%);z-index:8}
.wing{position:absolute;top:38px;width:44px;height:38px;border:5px solid #111;z-index:1}.leftWing{left:-22px;transform:skewY(-25deg) rotate(-10deg);border-radius:30px 8px 30px 8px}.rightWing{right:-22px;transform:skewY(25deg) rotate(10deg);border-radius:8px 30px 8px 30px}
.beastTail{position:absolute;right:-30px;bottom:28px;width:48px;height:28px;border:5px solid #111;border-left:0;border-radius:0 30px 30px 0;z-index:1}
.hit{animation:hit .25s steps(3)}@keyframes hit{50%{filter:brightness(2);transform:translateX(18px)}}.evo{animation:evo 1s}@keyframes evo{50%{filter:brightness(3);transform:scale(1.25) rotate(8deg)}}
#battlePanel{position:absolute;left:8px;right:8px;bottom:8px;background:#17264c;border:4px solid #8ce4ff;border-radius:20px;padding:10px}
#text{font-weight:800;min-height:44px;font-size:17px;margin-bottom:8px}
#battleBtns,#moves{display:grid;grid-template-columns:1fr 1fr;gap:8px}
</style>
</head>
<body>
<div id="game">
  <div id="start"><div class="card"><h1>Capsule Beasts</h1><p>Nieuwe map met gebouwen, healing center, shop, NPC’s en betere monsters.</p><button id="startBtn">Start avontuur</button></div></div>

  <div id="world">
    <div id="top">
      <span id="loc">Town</span><span>€<span id="money">300</span></span><span>Caps: <span id="caps">10</span></span>
      <button id="saveBtn">Save</button><button id="loadBtn">Load</button><button id="dexBtn">Dex</button><button id="bagBtn">Bag</button>
    </div>
    <div id="map"></div><div id="npcLayer"></div><div id="player"></div>

    <div id="dpad"><button class="dp" id="up">▲</button><button class="dp" id="left">◀</button><button class="dp" id="right">▶</button><button class="dp" id="down">▼</button></div>
    <div id="rightBtns"><button id="actBtn">Actie</button><button id="teamBtn">Team</button></div>

    <div id="teamPanel" class="panel"></div><div id="dexPanel" class="panel"></div><div id="bagPanel" class="panel"></div><div id="msgPanel" class="panel"></div>
  </div>

  <div id="battle">
    <div id="enemyHud" class="hud"></div><div id="playerHud" class="hud"></div>
    <div id="enemyMon" class="mon"></div><div id="myMon" class="mon"></div>
    <div id="battlePanel">
      <div id="text">Battle!</div>
      <div id="battleBtns"><button id="fightBtn">Vecht</button><button id="catchBtn">Vang</button><button id="capBtn">Capsule</button><button id="runBtn">Vlucht</button></div>
      <div id="moves" style="display:none"></div>
    </div>
  </div>
</div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const ELEMENTS=["Fire","Water","Nature","Electric","Ice","Shadow","Light","Earth","Wind","Metal","Psychic","Toxic"];
const COLORS={Fire:"#ff6b4a",Water:"#4ab7ff",Nature:"#61d66f",Electric:"#ffd84a",Ice:"#9df1ff",Shadow:"#6b54d6",Light:"#fff49a",Earth:"#a77a4f",Wind:"#c8f2ff",Metal:"#aeb8c8",Psychic:"#ff8ee4",Toxic:"#9dff57"};
const STRONG={Fire:["Nature","Ice"],Water:["Fire","Earth"],Nature:["Water","Earth"],Electric:["Water","Wind"],Ice:["Nature","Wind"],Shadow:["Light","Psychic"],Light:["Shadow","Toxic"],Earth:["Electric","Metal"],Wind:["Nature","Toxic"],Metal:["Ice","Light"],Psychic:["Metal","Toxic"],Toxic:["Nature","Psychic"]};
const SYL=["Axo","Luna","Pyro","Mizu","Terra","Venti","Noct","Lumi","Toxi","Ferro","Psy","Glaci","Bram","Zara","Kiro","Nebu","Volt","Moro","Cava","Rift"];
const TAILS=["ling","pup","rex","fin","horn","wing","shade","bloom","claw","geist","orb","moth","fang","shell","drake","root","spark","mire","nova","tail"];

function moveSet(el){return["Tap","Bite","Rush","Burst"].map((n,i)=>({name:el+" "+n,el,power:[30,45,60,78][i],status:i===2?["burn","poison","freeze","stun","sleep"][ELEMENTS.indexOf(el)%5]:null}))}
function buildDex(){let a=[];for(let i=0;i<300;i++){let st=i%3,el=ELEMENTS[i%ELEMENTS.length],el2=i%5===0?ELEMENTS[(i+4)%12]:null,base=30+(i%40)+st*12,line=i-st,evo=null;if(st<2&&line+st+1<300)evo=line+st+1;let name=SYL[i%SYL.length]+TAILS[(i*7)%TAILS.length]+(st===1?"o":st===2?"ar":"");a.push({id:i,name,el,el2,color:COLORS[el],accent:COLORS[el2||el],stage:st,evo,evoLevel:st===0?8+i%10:20+i%12,method:st===0?(i%4===0?"stone":i%7===0?"friendship":"level"):"level",rarity:1+i%6,captureRate:80-(i%6)*8-st*7,curve:["fast","medium","slow"][i%3],hp:base+28,atk:base+8+i%9,def:base+6+(i*3)%9,spd:base+5+(i*5)%9,moves:moveSet(el)});}return a}
const DEX=buildDex();

const MAPS={
town:{name:"Starter Town",spawn:{x:7,y:7},tiles:[
"################",
"#....gggg......#",
"#..CCC..SSS....#",
"#..Cdc..SdS....#",
"#..............#",
"#..HHH....ggg..#",
"#..HdH....ggg..#",
"#......pppp....#",
"#......p..p....#",
"#..ggg.p..p....#",
"#..ggg....p....#",
"#..............#",
"################"],npcs:[
{name:"Mila",x:10,y:7,msg:"Welkom! In het rode gebouw genees je monsters. In het gele gebouw koop je spullen.",walk:true},
{name:"Ranger",x:4,y:10,msg:"Loop in donker gras om wilde monsters te vinden.",walk:true}
]},
center:{name:"Healing Center",spawn:{x:3,y:5},tiles:[
"#######",
"#.....#",
"#.NNN.#",
"#.....#",
"#.....#",
"#..D..#",
"#######"],npcs:[
{name:"Nurse",x:3,y:2,msg:"Wil je dat ik je monsters genees?",heal:true,walk:false}
]},
shop:{name:"Capsule Shop",spawn:{x:3,y:5},tiles:[
"#######",
"#.....#",
"#.KKK.#",
"#.....#",
"#.....#",
"#..D..#",
"#######"],npcs:[
{name:"Shopkeeper",x:3,y:2,msg:"Welkom in mijn winkel!",shop:true,walk:false}
]},
house:{name:"House",spawn:{x:3,y:5},tiles:[
"#######",
"#.....#",
"#..T..#",
"#.....#",
"#.....#",
"#..D..#",
"#######"],npcs:[
{name:"Old Tamers",x:3,y:2,msg:"Monsters evolueren door levels, stenen of vriendschap.",walk:false}
]}
};

let S={map:"town",x:7,y:7,money:300,caps:{normal:10,ultra:3,dark:1,elemental:1},potions:3,stones:2,capsule:"normal",team:[],box:[],seen:{},caught:{},inBattle:false};
let B=null,npcs=[];

function makeMon(id,lvl){let d=DEX[id];return{uid:Date.now()+Math.random(),id,lvl,xp:0,hp:maxHp(d,lvl),status:null,friend:0}}
function maxHp(d,l){return d.hp+l*5}
function xpNeed(l,c){return c==="fast"?18+l*l*4:c==="slow"?35+l*l*7:25+l*l*5}
function start(){S.team=[makeMon(0,5),makeMon(3,4),makeMon(6,4)];$("start").style.display="none";$("world").style.display="block";loadMap("town",7,7)}
function loadMap(name,x,y){S.map=name;S.x=x;S.y=y;drawMap();drawPlayer();loadNpcs();updateUi()}
function current(){return MAPS[S.map]}
function tileAt(x,y){return current().tiles[y]&&current().tiles[y][x]}
function pass(x,y){let t=tileAt(x,y);return t&&t!=="#"}
function drawMap(){let m=$("map");m.innerHTML="";let rows=current().tiles;for(let y=0;y<rows.length;y++)for(let x=0;x<rows[y].length;x++){let ch=rows[y][x],e=document.createElement("div");e.className="tile "+classFor(ch);e.style.left=x*48+"px";e.style.top=70+y*48+"px";m.appendChild(e)}}
function classFor(ch){return ch==="#"?"wall":ch==="g"?"tall":ch==="w"?"water":ch==="C"?"center":ch==="S"?"shop":ch==="H"?"house":ch==="d"||ch==="D"?"door":ch==="N"||ch==="K"?"counter":ch==="p"?"path":"grass"}
function drawPlayer(){$("player").style.left=S.x*48+7+"px";$("player").style.top=70+S.y*48+2+"px"}
function loadNpcs(){npcs=current().npcs.map(n=>({...n}));drawNpcs()}
function drawNpcs(){let l=$("npcLayer");l.innerHTML="";npcs.forEach((n,i)=>{let e=document.createElement("div");e.className="npc";e.id="npc"+i;e.style.left=n.x*48+7+"px";e.style.top=70+n.y*48+2+"px";l.appendChild(e)})}
function npcAt(x,y){return npcs.find(n=>n.x===x&&n.y===y)}
function move(dx,dy){if(S.inBattle)return;let nx=S.x+dx,ny=S.y+dy;if(!pass(nx,ny)||npcAt(nx,ny))return;S.x=nx;S.y=ny;drawPlayer();handleTile()}
function handleTile(){let t=tileAt(S.x,S.y);if(t==="d"){if(S.map==="town"&&S.x>=2&&S.x<=4)loadMap("center",3,5);else if(S.map==="town"&&S.x>=8&&S.x<=10)loadMap("shop",3,5);else if(S.map==="town")loadMap("house",3,5)}if(t==="D")loadMap("town",7,7);if(t==="g"&&Math.random()<.28)wildEncounter();updateUi()}
function wildEncounter(){let ids=[0,1,2,3,36,37,72,73,108,109,120,121,150,151,210,211],id=ids[Math.floor(Math.random()*ids.length)];startBattle(makeMon(id,3+Math.floor(Math.random()*8)))}

function action(){let n=npcs.find(n=>Math.abs(n.x-S.x)+Math.abs(n.y-S.y)<=1);if(!n){showMessage("Niemand om mee te praten.");return}if(n.heal){S.team.forEach(m=>m.hp=maxHp(DEX[m.id],m.lvl));showMessage("Je team is volledig genezen!")}else if(n.shop){showShop()}else showMessage(n.name+": "+n.msg)}
function npcWalk(){if(S.inBattle)return;npcs.forEach(n=>{if(!n.walk)return;let dirs=[[1,0],[-1,0],[0,1],[0,-1],[0,0]],d=dirs[Math.floor(Math.random()*dirs.length)],nx=n.x+d[0],ny=n.y+d[1];if(pass(nx,ny)&&!(nx===S.x&&ny===S.y)&&!npcAt(nx,ny)){n.x=nx;n.y=ny}});drawNpcs()}
setInterval(npcWalk,1200);

function active(){return S.team.find(m=>m.hp>0)||S.team[0]}
function startBattle(enemy){S.inBattle=true;B={enemy};S.seen[enemy.id]=1;$("battle").style.display="block";$("moves").style.display="none";$("battleBtns").style.display="grid";setText("Een wilde "+DEX[enemy.id].name+" verschijnt!");renderBattle()}
function monsterArt(el,d){let shape=d.id%8,horn=d.id%3===0,wings=d.id%4===0,tail=d.id%5!==0,spikes=d.id%6===0;el.style.background="transparent";el.innerHTML=`${wings?`<div class="wing leftWing" style="background:${d.accent}"></div><div class="wing rightWing" style="background:${d.accent}"></div>`:""}${tail?`<div class="beastTail" style="background:${d.accent}"></div>`:""}<div class="beastBody shape${shape}" style="background:${d.color}">${horn?`<div class="horn"></div>`:""}${spikes?`<div class="spikes"></div>`:""}<div class="monsterEye eyeL"></div><div class="monsterEye eyeR"></div><div class="monsterMouth"></div><div class="belly" style="background:${d.accent}"></div></div>`}
function hud(m){let d=DEX[m.id],h=maxHp(d,m.lvl),p=Math.max(0,m.hp/h*100);return`<b>${d.name}</b> Lv.${m.lvl} <span class=tag>${d.el}</span><div class=bar><span style="width:${p}%"></span></div><span class=small>HP ${Math.max(0,m.hp)}/${h}</span>`}
function renderBattle(){let p=active(),e=B.enemy;monsterArt($("myMon"),DEX[p.id]);monsterArt($("enemyMon"),DEX[e.id]);$("playerHud").innerHTML=hud(p);$("enemyHud").innerHTML=hud(e);updateUi()}
function mult(moveEl,d){let m=1;if(STRONG[moveEl]?.includes(d.el))m*=1.6;if(d.el2&&STRONG[moveEl]?.includes(d.el2))m*=1.35;return m}
function damage(a,b,move){let ad=DEX[a.id],bd=DEX[b.id],m=mult(move.el,bd),crit=Math.random()<.08?1.8:1;return{amount:Math.max(2,Math.floor(((ad.atk+a.lvl*3)/(bd.def+b.lvl*3))*move.power*m*crit/2.4)),text:(m>1.2?" Super effectief!":"")+(crit>1?" Critical!":"")}}
function showMoves(){let d=DEX[active().id];$("battleBtns").style.display="none";$("moves").style.display="grid";$("moves").innerHTML=d.moves.map((m,i)=>`<button onclick="useMove(${i})">${m.name}<br><span class=small>${m.el} ${m.power}</span></button>`).join("")+`<button onclick="backBtns()">Terug</button>`}
function backBtns(){$("moves").style.display="none";$("battleBtns").style.display="grid"}
function useMove(i){let p=active(),e=B.enemy,m=DEX[p.id].moves[i],r=damage(p,e,m);e.hp-=r.amount;$("enemyMon").classList.add("hit");setTimeout(()=>$("enemyMon").classList.remove("hit"),250);setText(DEX[p.id].name+" gebruikt "+m.name+"."+r.text);renderBattle();if(e.hp<=0){winBattle();return}setTimeout(enemyTurn,650)}
function enemyTurn(){let e=B.enemy,p=active(),m=DEX[e.id].moves[Math.floor(Math.random()*4)],r=damage(e,p,m);p.hp-=r.amount;$("myMon").classList.add("hit");setTimeout(()=>$("myMon").classList.remove("hit"),250);setText(DEX[e.id].name+" gebruikt "+m.name+"."+r.text);renderBattle();if(p.hp<=0&&!S.team.find(x=>x.hp>0)){showMessage("Je team verloor en wordt genezen.");S.team.forEach(x=>x.hp=maxHp(DEX[x.id],x.lvl));endBattle()}}
function winBattle(){let p=active(),gain=20+B.enemy.lvl*8;p.xp+=gain;p.friend+=3;S.money+=25;setText("Gewonnen! +"+gain+" XP en €25.");levelUp(p);setTimeout(endBattle,900)}
function levelUp(m){let d=DEX[m.id];while(m.xp>=xpNeed(m.lvl,d.curve)){m.xp-=xpNeed(m.lvl,d.curve);m.lvl++;m.hp=maxHp(d,m.lvl);checkEvolution(m);d=DEX[m.id]}}
function checkEvolution(m){let d=DEX[m.id];if(d.evo==null)return false;let ok=(d.method==="level"&&m.lvl>=d.evoLevel)||(d.method==="stone"&&S.stones>0&&m.lvl>=d.evoLevel)||(d.method==="friendship"&&m.friend>=12);if(!ok)return false;if(d.method==="stone")S.stones--;m.id=d.evo;m.hp=maxHp(DEX[m.id],m.lvl);$("myMon").classList.add("evo");setTimeout(()=>$("myMon").classList.remove("evo"),1000);return true}
function capture(){let e=B.enemy,d=DEX[e.id];if(S.caps[S.capsule]<=0){setText("Geen "+S.capsule+" capsules.");return}S.caps[S.capsule]--;let hp=e.hp/maxHp(d,e.lvl),bonus={normal:1,ultra:1.7,dark:d.el==="Shadow"?2:1,elemental:1.3}[S.capsule],chance=(d.captureRate/100)*(1.25-hp)*bonus/(d.rarity*.35);setText("Je gooit een "+S.capsule+" capsule...");setTimeout(()=>{if(Math.random()<chance){S.caught[e.id]=1;let c=JSON.parse(JSON.stringify(e));if(S.team.length<6)S.team.push(c);else S.box.push(c);setText(d.name+" gevangen!");setTimeout(endBattle,700)}else{setText(d.name+" breekt los!");setTimeout(enemyTurn,600)}renderBattle()},500)}
function chooseCap(){let k=Object.keys(S.caps),i=k.indexOf(S.capsule);S.capsule=k[(i+1)%k.length];setText("Capsule: "+S.capsule)}
function endBattle(){S.inBattle=false;$("battle").style.display="none";updateUi()}
function setText(t){$("text").textContent=t}

function closePanels(){["teamPanel","dexPanel","bagPanel","msgPanel"].forEach(id=>$(id).style.display="none")}
function showMessage(t){closePanels();$("msgPanel").style.display="block";$("msgPanel").innerHTML=`<b>${t}</b><br><br><button onclick="closePanels()">OK</button>`}
function showTeam(){let p=$("teamPanel"),open=p.style.display==="block";closePanels();if(open)return;p.style.display="block";p.innerHTML="<h3>Team</h3>"+S.team.map((m,i)=>{let d=DEX[m.id];return`<div class=row><span><span class=mini style="background:${d.color}"></span> <b>${d.name}</b> Lv.${m.lvl}<br><span class=small>${d.el} HP ${m.hp}/${maxHp(d,m.lvl)}</span></span><button onclick="checkEvolution(S.team[${i}]);showTeam()">Evolve</button></div>`}).join("")+`<p>Box: ${S.box.length}</p>`}
function showDex(){let p=$("dexPanel"),open=p.style.display==="block";closePanels();if(open)return;p.style.display="block";p.innerHTML=`<h3>Dex 300</h3><p>Gezien ${Object.keys(S.seen).length}/300 · Gevangen ${Object.keys(S.caught).length}/300</p>`+DEX.map(d=>`<div class=row><span><span class=mini style="background:${d.color}"></span> #${d.id+1} ${S.seen[d.id]||S.caught[d.id]?d.name:"???"}</span><span class=tag>${d.el}</span></div>`).join("")}
function showBag(){let p=$("bagPanel"),open=p.style.display==="block";closePanels();if(open)return;p.style.display="block";p.innerHTML=`<h3>Bag</h3><p>Potions: ${S.potions}</p><p>Normal: ${S.caps.normal}</p><p>Ultra: ${S.caps.ultra}</p><p>Dark: ${S.caps.dark}</p><p>Elemental: ${S.caps.elemental}</p><p>Rare stones: ${S.stones}</p>`}
function showShop(){closePanels();let p=$("msgPanel");p.style.display="block";p.innerHTML=`<h3>Shop</h3><p>Geld: €${S.money}</p><button onclick="buy('normal',25)">Koop Normal Capsule €25</button><br><br><button onclick="buy('ultra',70)">Koop Ultra Capsule €70</button><br><br><button onclick="buyPotion()">Koop Potion €35</button><br><br><button onclick="sellStone()">Verkoop Rare Stone +€100</button><br><br><button onclick="closePanels()">Sluit</button>`}
function buy(type,price){if(S.money<price){showMessage("Niet genoeg geld.");return}S.money-=price;S.caps[type]++;showShop();updateUi()}
function buyPotion(){if(S.money<35){showMessage("Niet genoeg geld.");return}S.money-=35;S.potions++;showShop();updateUi()}
function sellStone(){if(S.stones<=0){showMessage("Geen stones om te verkopen.");return}S.stones--;S.money+=100;showShop();updateUi()}
function saveGame(){localStorage.setItem("capsuleBeastsMap",JSON.stringify(S));showMessage("Game opgeslagen.")}
function loadGame(){let raw=localStorage.getItem("capsuleBeastsMap");if(!raw){showMessage("Geen save gevonden.");return}S=JSON.parse(raw);S.inBattle=false;$("start").style.display="none";$("world").style.display="block";$("battle").style.display="none";loadMap(S.map,S.x,S.y);showMessage("Save geladen.")}
function updateUi(){$("money").textContent=S.money;$("caps").textContent=`N${S.caps.normal} U${S.caps.ultra} D${S.caps.dark} E${S.caps.elemental}`;$("loc").textContent=current().name}

function bind(id,fn){let e=$(id);e.addEventListener("click",fn);e.addEventListener("touchstart",x=>{x.preventDefault();fn()},{passive:false})}
bind("startBtn",start);bind("up",()=>move(0,-1));bind("down",()=>move(0,1));bind("left",()=>move(-1,0));bind("right",()=>move(1,0));bind("actBtn",action);bind("teamBtn",showTeam);bind("dexBtn",showDex);bind("bagBtn",showBag);bind("saveBtn",saveGame);bind("loadBtn",loadGame);bind("fightBtn",showMoves);bind("catchBtn",capture);bind("capBtn",chooseCap);bind("runBtn",endBattle);
window.addEventListener("keydown",e=>{if(e.key==="ArrowUp")move(0,-1);if(e.key==="ArrowDown")move(0,1);if(e.key==="ArrowLeft")move(-1,0);if(e.key==="ArrowRight")move(1,0);if(e.key==="Enter")action()});
</script>
</body>
</html>
